<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador XML / TXT</title>
    <link rel="stylesheet" href="validador.css">
</head>
<body class="dark">

    <button id="toggleTheme" class="theme-toggle" aria-label="Alterar Tema">
        🌙 Modo Escuro
    </button>

    <h1>Validador de XML e TXT</h1>

    <section>
        <label class="file-label">
            <span>Selecione um arquivo (.xml ou .txt)</span>
            <input type="file" id="fileInput" accept=".xml,.txt">
        </label>

        <div id="meta" class="meta"></div> <!-- Exibe informações sobre o arquivo -->

        <div id="status" class="status"></div>
    </section>

    <section class="card">
        <h2>Contéudo</h2>
        <pre id="output"></pre> <!-- Área que exibe o resultado -->
    </section>

    <script src="validador.js"></script>
</body>
</html>
